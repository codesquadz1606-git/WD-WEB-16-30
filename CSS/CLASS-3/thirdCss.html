<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

</style>
<body>
    <!-- 
        display : inline, block, inline-block
    -->

    <!-- Here we have converted an inline tag into a block tag -->
    <span style="background-color: blue; display: block;">Hello</span>

    <!-- Here we have converted a block tag into an inline tag -->
    <p style="background-color: yellow; display: inline;">
        Hello
    </p>

    <hr>

    <!-- Here if content is at line 1 then till then it is inline tag, as soon as content is at second line it is block tag. -->
    <div style="background-color: beige; display: inline-block;">
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
        hello Everyone
    </div>
</body>
</html>
